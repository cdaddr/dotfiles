# catppuccin macchiato
# generated by ai

[colors]
# standard color palette (catppuccin macchiato names)
black        = "181926"  # Crust
grey_darkest = "1e2030"  # Mantle
grey_darker  = "24273a"  # Base
grey_dark    = "363a4f"  # Surface0
grey_dim     = "494d64"  # Surface1
grey         = "626880"  # Overlay0
white        = "b8c0e0"  # Subtext1
bright_white = "cad3f5"  # Text

red          = "ed8796"  # Red
orange       = "f5a97f"  # Peach
yellow       = "eed49f"  # Yellow
green        = "a6da95"  # Green
cyan         = "8bd5ca"  # Teal
blue         = "8aadf4"  # Blue
purple       = "c6a0f6"  # Mauve
pink         = "f5bde6"  # Pink

# bright variants (catppuccin macchiato has no distinct brights for most colors)
bright_red    = "ed8796"  # Red
bright_orange = "ee99a0"  # Maroon
bright_yellow = "eed49f"  # Yellow
bright_green  = "a6da95"  # Green
bright_cyan   = "8bd5ca"  # Teal
bright_blue   = "8aadf4"  # Blue
bright_purple = "c6a0f6"  # Mauve

# theme-specific extras
lavender  = "b7bdf8"  # Lavender
overlay1  = "5b6078"  # Surface2/Overlay1
rosewater = "f4dbd6"  # Rosewater

# semantic aliases
fg        = "$bright_white"
bg        = "$grey_darker"
bg_dim    = "$grey_darkest"
bg_bright = "$grey_dark"
primary   = "$blue"
path      = "$pink"
accent    = "$lavender"
error     = "$red"
comment   = "$overlay1"
text      = "$fg"

[kitty]
font_size             = "20"
cursor                = "$rosewater"
selection_fg          = "$bright_white"
selection_bg          = "$grey_dim"
url_color             = "$blue"
active_tab_fg         = "$black"
active_tab_bg         = "$purple"
inactive_tab_fg       = "$purple"
inactive_tab_bg       = "$grey_darkest"
active_border_color   = "$lavender"
inactive_border_color = "$overlay1"
tab_inactive_index_fg = "$grey_dark"
tab_inactive_index_bg = "$grey"
tab_inactive_title_bg = "$grey_dark"
tab_inactive_title_fg = "$overlay1"
tab_active_index_bg   = "$primary"
tab_active_index_fg   = "$black"
tab_active_title_bg   = "$purple"

[nvim]
theme   = "catppuccin-macchiato"
lualine = "catppuccin-macchiato"

[wezterm]
theme = "Catppuccin Macchiato"

[vivid]
theme = "catppuccin-macchiato"

[bat]
theme = "Catppuccin Macchiato"

[less]
search_bg = "\\e[48;5;183m"
search_fg = "\\e[38;5;0m"
