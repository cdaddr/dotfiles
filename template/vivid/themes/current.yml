# generated by ai
# Generic vivid theme tracking the active palette. The colors block is filled
# by generate.py from the active theme (themes/*.toml); the semantic mapping
# below is adapted from vivid's bundled tokyonight-storm theme.

colors:
  fg:        "{{colors.bright_white}}"
  bg:        "{{colors.grey_darkest}}"

  gray1:     "{{colors.grey_dark}}"  # subtle background highlight
  gray2:     "{{colors.grey_dim}}"   # unimportant
  gray3:     "{{colors.grey}}"       # normal text / comment

  red1:      "{{colors.red}}"        # autumnRed
  red2:      "{{colors.bright_red}}" # samuraiRed / errors
  orange:    "{{colors.orange}}"
  yellow:    "{{colors.yellow}}"

  green1:    "{{colors.green}}"        # autumnGreen
  green2:    "{{colors.cyan}}"         # waveAqua1 (teal)
  green3:    "{{colors.bright_green}}" # springGreen

  blue1:     "{{colors.bright_yellow}}" # carpYellow (todo attention)
  blue2:     "{{colors.bright_cyan}}"   # waveAqua2
  blue3:     "{{colors.bright_blue}}"   # springBlue
  blue4:     "{{colors.bright_blue}}"   # springBlue
  blue5:     "{{colors.bright_cyan}}"   # waveAqua2
  blue6:     "{{colors.blue}}"          # crystalBlue (directories)

  purple1:   "{{colors.purple}}" # oniViolet
  purple2:   "{{colors.pink}}"   # sakuraPink

  bg_red1:   "{{colors.grey_darker}}"
  bg_orange: "{{colors.grey_darker}}"
  bg_yellow: "{{colors.grey_darker}}"
  bg_green1: "{{colors.grey_darker}}"
  bg_green2: "{{colors.blue_dim}}"

core: # See `dircolors -p` for explanations
  normal_text:
    foreground: gray3

  regular_file: {}

  reset_to_normal:
    foreground: gray3

  directory:
    foreground: blue6
    font-style: bold

  executable_file: # Files with exec permissions
    foreground: green1
    font-style: bold

  file_with_capability:
    background: gray1

  setuid:
    background: gray1

  setgid:
    background: gray1

  sticky:
    background: gray1

  sticky_other_writable: # Usually a directory on Linux
    foreground: bg
    background: blue6
    font-style: bold

  other_writable: # Ditto ^
    foreground: blue6
    background: gray1
    font-style: bold

  symlink:
    foreground: blue4
    font-style: italic

  broken_symlink:
    foreground: bg
    background: red2

  missing_symlink_target:
    foreground: red2

  multi_hard_link: {}

  socket:
    foreground: green2
    background: bg_green2
    font-style: bold

  fifo:
    foreground: orange
    background: bg_orange
    font-style: bold

  door:
    foreground: green1
    background: bg_green1
    font-style: bold

  block_device:
    foreground: red1
    background: bg_red1
    font-style: bold

  character_device:
    foreground: yellow
    background: bg_yellow
    font-style: bold

executable: # Libs and exec binaries (without exec permissions)
  foreground: green2

archives:
  foreground: red1
  font-style: bold

media:
  audio:
    foreground: blue3
    font-style: bold
  image:
    foreground: purple1
    font-style: bold
  video:
    foreground: green3
    font-style: bold
  fonts:
    foreground: green2
    font-style: bold
  3d:
    foreground: purple1
    font-style: bold

office:
  foreground: purple2
  font-style: bold

text:
  foreground: fg
  configuration:
    foreground: orange
    dockerfile:
      foreground: blue2
  licenses:
    foreground: fg
    font-style: bold
  special:
    foreground: blue5
    font-style: bold
  todo:
    foreground: blue1
    font-style: bold

markup:
  foreground: fg

programming:
  foreground: yellow
  tooling:
    foreground: blue3
    continuous-integration:
      foreground: blue2

unimportant:
  foreground: gray2
