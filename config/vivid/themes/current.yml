# generated by ai
# Generic vivid theme tracking the active palette. The colors block is filled
# by generate.py from the active theme (themes/*.toml); the semantic mapping
# below is adapted from vivid's bundled tokyonight-storm theme.

colors:
  fg:        "DCD7BA"
  bg:        "1F1F28"

  gray1:     "363646"  # subtle background highlight
  gray2:     "54546D"   # unimportant
  gray3:     "727169"       # normal text / comment

  red1:      "C34043"        # autumnRed
  red2:      "E82424" # samuraiRed / errors
  orange:    "ffa066"
  yellow:    "C0A36E"

  green1:    "76946A"        # autumnGreen
  green2:    "6a9589"         # waveAqua1 (teal)
  green3:    "98bb6c" # springGreen

  blue1:     "e6c384" # carpYellow (todo attention)
  blue2:     "7aa89f"   # waveAqua2
  blue3:     "7fb4ca"   # springBlue
  blue4:     "7fb4ca"   # springBlue
  blue5:     "7aa89f"   # waveAqua2
  blue6:     "7E9CD8"          # crystalBlue (directories)

  purple1:   "957FB8" # oniViolet
  purple2:   "D27E99"   # sakuraPink

  bg_red1:   "2A2A37"
  bg_orange: "2A2A37"
  bg_yellow: "2A2A37"
  bg_green1: "2A2A37"
  bg_green2: "2d4f67"

core: # See `dircolors -p` for explanations
  normal_text:
    foreground: gray3

  regular_file: {}

  reset_to_normal:
    foreground: gray3

  directory:
    foreground: blue6
    font-style: bold

  executable_file: # Files with exec permissions
    foreground: green1
    font-style: bold

  file_with_capability:
    background: gray1

  setuid:
    background: gray1

  setgid:
    background: gray1

  sticky:
    background: gray1

  sticky_other_writable: # Usually a directory on Linux
    foreground: bg
    background: blue6
    font-style: bold

  other_writable: # Ditto ^
    foreground: blue6
    background: gray1
    font-style: bold

  symlink:
    foreground: blue4
    font-style: italic

  broken_symlink:
    foreground: bg
    background: red2

  missing_symlink_target:
    foreground: red2

  multi_hard_link: {}

  socket:
    foreground: green2
    background: bg_green2
    font-style: bold

  fifo:
    foreground: orange
    background: bg_orange
    font-style: bold

  door:
    foreground: green1
    background: bg_green1
    font-style: bold

  block_device:
    foreground: red1
    background: bg_red1
    font-style: bold

  character_device:
    foreground: yellow
    background: bg_yellow
    font-style: bold

executable: # Libs and exec binaries (without exec permissions)
  foreground: green2

archives:
  foreground: red1
  font-style: bold

media:
  audio:
    foreground: blue3
    font-style: bold
  image:
    foreground: purple1
    font-style: bold
  video:
    foreground: green3
    font-style: bold
  fonts:
    foreground: green2
    font-style: bold
  3d:
    foreground: purple1
    font-style: bold

office:
  foreground: purple2
  font-style: bold

text:
  foreground: fg
  configuration:
    foreground: orange
    dockerfile:
      foreground: blue2
  licenses:
    foreground: fg
    font-style: bold
  special:
    foreground: blue5
    font-style: bold
  todo:
    foreground: blue1
    font-style: bold

markup:
  foreground: fg

programming:
  foreground: yellow
  tooling:
    foreground: blue3
    continuous-integration:
      foreground: blue2

unimportant:
  foreground: gray2
