# kanagawa dragon
# generated by ai

[colors]
# standard color palette (kanagawa dragon names)
black        = "16161D"  # sumiInk0
grey_darkest = "1F1F28"  # sumiInk1/dragonBlack3
grey_darker  = "2A2A37"  # sumiInk2
grey_dark    = "2B2B34"  # dragonBlack5
grey_dim     = "54546D"  # sumiInk4 (shared from wave)
grey         = "727169"  # fujiGray
white        = "C8C093"  # oldWhite
bright_white = "DCD7BA"  # fujiWhite

red          = "C4746E"  # dragonRed
orange       = "B6927B"  # dragonOrange
yellow       = "C0A36E"  # dragonYellow
green        = "8A9A7B"  # dragonGreen
cyan         = "8EA4A2"  # dragonAqua
blue         = "8EA4A2"  # dragonAqua (same as cyan in dragon palette)
purple       = "A292A3"  # dragonPink
pink         = "A292A3"  # dragonPink (same as purple)

# bright variants
bright_red    = "E46876"  # samuraiRed
bright_orange = "C4746E"  # dragonRed (maroon role)
bright_yellow = "E6C384"  # carpYellow
bright_green  = "87A987"  # springGreen
bright_cyan   = "7AA89F"  # waveAqua2
bright_blue   = "7FB4CA"  # springBlue
bright_purple = "938AA9"  # springViolet1

# theme-specific extras
comment = "716E61"  # dragonGray2

# semantic aliases
fg        = "$bright_white"
bg        = "$grey_darkest"
bg_dim    = "$grey_darker"
bg_bright = "$grey_dark"
primary   = "$cyan"
path      = "$purple"
accent    = "$purple"
error     = "$red"
text      = "$fg"

[kitty]
font_size             = "20"
cursor                = "$white"
selection_fg          = "$white"
selection_bg          = "$grey_darker"
url_color             = "$bright_blue"
active_tab_fg         = "$grey_darkest"
active_tab_bg         = "$purple"
inactive_tab_fg       = "$purple"
inactive_tab_bg       = "$grey_darkest"
active_border_color   = "$purple"
inactive_border_color = "$grey_darkest"
tab_inactive_index_fg = "$grey_darker"
tab_inactive_index_bg = "$grey"
tab_inactive_title_bg = "$grey_darker"
tab_inactive_title_fg = "$comment"
tab_active_index_bg   = "$cyan"
tab_active_index_fg   = "$black"
tab_active_title_bg   = "$purple"

[nvim]
theme   = "kanagawa-dragon"
lualine = "kanagawa"

[wezterm]
theme = "Kanagawa Dragon (Gogh)"

[vivid]
theme = "tokyonight-night"

[bat]
theme = "OneHalfDark"

[less]
search_bg = "\\e[48;5;183m"
search_fg = "\\e[38;5;0m"
