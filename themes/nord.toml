# nord
# generated by ai

[colors]
# standard color palette (nord names)
black        = "2E3440"  # Polar Night 1 (darkest)
grey_darkest = "2E3440"  # Polar Night 1 (same as black - Nord has no blacker bg)
grey_darker  = "3B4252"  # Polar Night 2
grey_dark    = "434C5E"  # Polar Night 3
grey_dim     = "4C566A"  # Polar Night 4
grey         = "4C566A"  # Polar Night 4 (Nord has no mid-grey between dark and bright)
white        = "D8DEE9"  # Snow Storm 1
bright_white = "ECEFF4"  # Snow Storm 3

red          = "BF616A"  # Aurora 1
orange       = "D08770"  # Aurora 2
yellow       = "EBCB8B"  # Aurora 3
green        = "A3BE8C"  # Aurora 4
cyan         = "88C0D0"  # Frost 2
blue         = "81A1C1"  # Frost 3
purple       = "B48EAD"  # Aurora 5
pink         = "B48EAD"  # Aurora 5 (same as purple)

# bright variants (Nord has no distinct brights for Aurora)
bright_red    = "BF616A"  # Aurora 1
bright_orange = "5E81AC"  # Frost 4 (used for color17)
bright_yellow = "EBCB8B"  # Aurora 3
bright_green  = "A3BE8C"  # Aurora 4
bright_cyan   = "8FBCBB"  # Frost 1
bright_blue   = "81A1C1"  # Frost 3
bright_purple = "B48EAD"  # Aurora 5

# semantic aliases
fg        = "$white"
bg        = "$black"
bg_dim    = "$black"
bg_bright = "$grey_darker"
primary   = "$blue"
path      = "$purple"
accent    = "$blue"
error     = "$red"
comment   = "$grey_dim"
text      = "$fg"

[kitty]
font_size             = "20"
cursor                = "$white"
selection_fg          = "$white"
selection_bg          = "$grey_dark"
url_color             = "$cyan"
active_tab_fg         = "$black"
active_tab_bg         = "$blue"
inactive_tab_fg       = "$blue"
inactive_tab_bg       = "$black"
active_border_color   = "$blue"
inactive_border_color = "$grey_darker"
tab_inactive_index_fg = "$grey_darker"
tab_inactive_index_bg = "$grey_dim"
tab_inactive_title_bg = "$grey_darker"
tab_inactive_title_fg = "$grey_dim"
tab_active_index_bg   = "$primary"
tab_active_index_fg   = "$black"
tab_active_title_bg   = "$purple"

[nvim]
theme   = "nordic"
lualine = "nordic"

[wezterm]
theme = "Nord"

[vivid]
theme = "nord"

[bat]
theme = "Nord"

[less]
search_bg = "\\e[48;5;183m"
search_fg = "\\e[38;5;0m"
