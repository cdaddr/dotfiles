# tokyonight night
# generated by ai

[colors]
# standard color palette (tokyonight night names)
black        = "15161e"  # terminal black (color0)
grey_darkest = "16161e"  # Black
grey_darker  = "1a1b26"  # Base
grey_dark    = "292e42"  # Surface
grey_dim     = "414868"  # Surface2
grey         = "565f89"  # Comment
white        = "a9b1d6"  # terminal white (color7)
bright_white = "c0caf5"  # Text

red          = "f7768e"  # Red
orange       = "ff9e64"  # Orange
yellow       = "e0af68"  # Yellow
green        = "9ece6a"  # Green
cyan         = "7dcfff"  # Cyan
blue         = "7aa2f7"  # Blue
purple       = "bb9af7"  # Purple
pink         = "f7768e"  # Red (no distinct pink in tokyonight)

# bright variants (tokyonight has no distinct brights for most colors)
bright_red    = "f7768e"  # Red
bright_orange = "db4b4b"  # DarkRed (color17)
bright_yellow = "e0af68"  # Yellow
bright_green  = "9ece6a"  # Green
bright_cyan   = "7dcfff"  # Cyan
bright_blue   = "7aa2f7"  # Blue
bright_purple = "bb9af7"  # Purple

# theme-specific extras
blue_dim = "364a82"  # selection blue
teal     = "73daca"  # teal

# semantic aliases
fg        = "$bright_white"
bg        = "$grey_darker"
bg_dim    = "$grey_darkest"
bg_bright = "$grey_dark"
primary   = "$blue"
path      = "$orange"
accent    = "$cyan"
error     = "$red"
comment   = "$grey"
text      = "$fg"

[kitty]
font_size             = "20"
cursor                = "$bright_white"
selection_fg          = "$bright_white"
selection_bg          = "$blue_dim"
url_color             = "$teal"
active_tab_fg         = "$grey_darkest"
active_tab_bg         = "$blue"
inactive_tab_fg       = "787c99"
inactive_tab_bg       = "$grey_darkest"
active_border_color   = "$cyan"
inactive_border_color = "$grey_dark"
tab_inactive_index_fg = "$grey_dark"
tab_inactive_index_bg = "$grey"
tab_inactive_title_bg = "$grey_dark"
tab_inactive_title_fg = "$grey"
tab_active_index_bg   = "$primary"
tab_active_index_fg   = "$black"
tab_active_title_bg   = "$purple"

[nvim]
theme   = "tokyonight-night"
lualine = "tokyonight-night"

[wezterm]
theme = "tokyonight_night"

[vivid]
theme = "tokyonight-night"

[bat]
theme = "TwoDark"

[less]
search_bg = "\\e[48;5;183m"
search_fg = "\\e[38;5;0m"
