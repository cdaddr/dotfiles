"$schema" = "https://jj-vcs.github.io/jj/latest/config-schema.json"

[ui]
default-command = "status"
merge-editor = ["nvim", "-c", "DiffviewOpen"]

[revset-aliases]
"recent" = "ancestors(@, 20)"
"stack" = "immutable_heads()..@"

[colors]
"diff added" = {fg = "bright green", bold = true}
"diff modified" = {fg = "bright cyan"}
"diff renamed" = {fg = "bright yellow", bold = true}

[aliases]
logs = ["log", "-r", "stack"]
