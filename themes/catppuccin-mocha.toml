# catppuccin mocha
# generated by ai

[colors]
# standard color palette (catppuccin mocha names)
black        = "11111b"  # Crust
grey_darkest = "181825"  # Mantle
grey_darker  = "1e1e2e"  # Base
grey_dark    = "313244"  # Surface0
grey_dim     = "45475a"  # Surface1
grey         = "6c7086"  # Overlay0
white        = "bac2de"  # Subtext1
bright_white = "cdd6f4"  # Text

red          = "f38ba8"  # Red
orange       = "fab387"  # Peach
yellow       = "f9e2af"  # Yellow
green        = "a6e3a1"  # Green
cyan         = "94e2d5"  # Teal
blue         = "89b4fa"  # Blue
purple       = "cba6f7"  # Mauve
pink         = "f5c2e7"  # Pink

# bright variants (catppuccin mocha has no distinct brights for most colors)
bright_red    = "f38ba8"  # Red
bright_orange = "eba0ac"  # Maroon
bright_yellow = "f9e2af"  # Yellow
bright_green  = "a6e3a1"  # Green
bright_cyan   = "94e2d5"  # Teal
bright_blue   = "89b4fa"  # Blue
bright_purple = "cba6f7"  # Mauve

# theme-specific extras
lavender  = "b4befe"  # Lavender
overlay1  = "7f849c"  # Overlay1
rosewater = "f5e0dc"  # Rosewater

# semantic aliases
fg        = "$bright_white"
bg        = "$grey_darker"
bg_dim    = "$grey_darkest"
bg_bright = "$grey_dark"
primary   = "$blue"
path      = "$pink"
accent    = "$lavender"
error     = "$red"
comment   = "$overlay1"
text      = "$fg"

[kitty]
font_size             = "20"
cursor                = "$rosewater"
selection_fg          = "$bright_white"
selection_bg          = "$grey_dim"
url_color             = "$blue"
active_tab_fg         = "$black"
active_tab_bg         = "$purple"
inactive_tab_fg       = "$purple"
inactive_tab_bg       = "$grey_darkest"
active_border_color   = "$lavender"
inactive_border_color = "$grey"
tab_inactive_index_fg = "$grey_dark"
tab_inactive_index_bg = "$grey"
tab_inactive_title_bg = "$grey_dark"
tab_inactive_title_fg = "$overlay1"
tab_active_index_bg   = "$primary"
tab_active_index_fg   = "$black"
tab_active_title_bg   = "$purple"

[nvim]
theme   = "catppuccin-mocha"
lualine = "catppuccin-mocha"

[wezterm]
theme = "Catppuccin Mocha"

[vivid]
theme = "catppuccin-mocha"

[bat]
theme = "Catppuccin Mocha"

[less]
search_bg = "\\e[48;5;183m"
search_fg = "\\e[38;5;0m"
